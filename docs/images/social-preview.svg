<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 640" width="1280" height="640" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#27243d"/>
      <stop offset="1" stop-color="#191826"/>
    </linearGradient>
  </defs>

  <rect x="0" y="0" width="1280" height="640" fill="url(#bg)"/>

  <!-- language names and file extensions, scattered faintly -->
  <g fill="#b6a6e8" font-family="ui-monospace, 'SF Mono', Menlo, Consolas, 'Liberation Mono', monospace" font-weight="500">
    <text x="80"   y="96"  font-size="40" fill-opacity="0.10">.cs</text>
    <text x="210"  y="80"  font-size="34" fill-opacity="0.08">TypeScript</text>
    <text x="560"  y="100" font-size="32" fill-opacity="0.07">.py</text>
    <text x="690"  y="86"  font-size="42" fill-opacity="0.11">Rust</text>
    <text x="900"  y="96"  font-size="36" fill-opacity="0.09">.go</text>
    <text x="1050" y="84"  font-size="32" fill-opacity="0.08">Kotlin</text>

    <text x="80"   y="586" font-size="36" fill-opacity="0.09">Python</text>
    <text x="290"  y="600" font-size="30" fill-opacity="0.07">.tsx</text>
    <text x="410"  y="588" font-size="38" fill-opacity="0.10">C++</text>
    <text x="540"  y="600" font-size="30" fill-opacity="0.07">Java</text>
    <text x="690"  y="588" font-size="34" fill-opacity="0.08">.rs</text>
    <text x="820"  y="600" font-size="34" fill-opacity="0.09">Swift</text>
    <text x="990"  y="588" font-size="34" fill-opacity="0.08">.php</text>
    <text x="1130" y="600" font-size="30" fill-opacity="0.07">.lua</text>
  </g>

  <!-- logo mark [{}] -->
  <text x="640" y="288" fill="#ffffff" font-family="ui-monospace, 'SF Mono', Menlo, Consolas, 'Liberation Mono', monospace" font-weight="700" font-size="190" text-anchor="middle">[{}]</text>

  <!-- wordmark + tagline -->
  <text x="640" y="440" font-size="100" font-weight="700" fill="#f4f4f6" text-anchor="middle">Code Linker</text>
  <text x="640" y="502" font-size="36" fill="#c2bfd2" text-anchor="middle">Autocomplete code references, jump to the exact line.</text>
</svg>
