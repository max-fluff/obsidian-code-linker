<text x="640" y="295" fill="#ffffff" font-family="ui-monospace,'SF Mono',Menlo,Consolas,'Liberation Mono',monospace" font-weight="700" font-size="163.89" text-anchor="middle">[{}]</text>

  <text x="640" y="432" font-size="100" font-weight="700" fill="#f4f4f6" text-anchor="middle">Code Linker</text>
