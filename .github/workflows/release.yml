name: Release

# Builds the plugin and opens a draft release with attested main.js, manifest.json and
# styles.css already attached. Publishing stays manual, so a release is never visible —
# or reviewable — before its assets are there, and they're only ever the ones CI built:
# a hand-attached file has a different digest (a working copy keeps CRLF, the repo is LF)
# and its attestation won't verify.

on:
  push:
    tags: ["[0-9]+.[0-9]+.[0-9]+"]

permissions:
  contents: write
  id-token: write
  attestations: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - run: npm ci
      - run: npm run build

      - name: Attest build provenance
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: |
            main.js
            manifest.json
            styles.css

      - name: Open a draft release with the assets attached
        env:
          GH_TOKEN: ${{ github.token }}
        run: >
          gh release create "${{ github.ref_name }}"
          --draft --title "${{ github.ref_name }}"
          main.js manifest.json styles.css
